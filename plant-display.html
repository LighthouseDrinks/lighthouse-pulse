<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>Plant Display — Lighthouse Drinks</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════
   PLANT DISPLAY — standalone file, zero external CSS deps
   ═══════════════════════════════════════════════════════ */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;
  background: #060f1a;
  color: #ffffff;
  font-family: 'Lato', sans-serif;
  -webkit-font-smoothing: antialiased;
}
body { display: flex; flex-direction: column; }

/* ── HEADER ─────────────────────────────────────────────── */
#hdr {
  flex: 0 0 52px;
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  border-bottom: 2px solid #1a2e45;
  background: #060f1a;
}
#hdr-logo {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.06em;
  color: #c9a84c;
  white-space: nowrap;
}
#hdr-mid {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
}
#hdr-date  { font-size: 13px; color: #7a93a8; }
#hdr-shift { font-size: 13px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #c9a84c; }
#hdr-right { display: flex; align-items: center; gap: 16px; }
#clock { font-size: 38px; font-weight: 700; font-variant-numeric: tabular-nums; white-space: nowrap; }
#btn-fs {
  background: transparent;
  border: 1px solid #1a2e45;
  color: #7a93a8;
  font-size: 12px;
  padding: 4px 10px;
  cursor: pointer;
  border-radius: 3px;
  font-family: 'Lato', sans-serif;
  white-space: nowrap;
}
#btn-fs:hover { border-color: #7a93a8; color: #fff; }

/* ── MAIN GRID ──────────────────────────────────────────── */
#main {
  flex: 1;
  min-height: 0;
  display: grid;
  grid-template-rows: 52% 1fr 160px;
  overflow: hidden;
}

/* ── TOP ROW ────────────────────────────────────────────── */
#top {
  display: flex;
  flex-direction: row;
  overflow: hidden;
  min-height: 0;
}

/* ── ACTIVE JOB PANEL (left, 60%) ────────────────────────── */
#active {
  flex: 0 0 60%;
  display: flex;
  flex-direction: column;
  padding: 20px 28px;
  overflow: hidden;
  min-width: 0;
}

/* Status badge — FIRST child, flex-shrink:0. Cannot be pushed off screen. */
#status-badge {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  padding-bottom: 14px;
  margin-bottom: 16px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
.dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  flex-shrink: 0;
  background: #7a93a8;
  transition: background 0.3s;
}
.dot.green  { background: #3dba78; }
.dot.amber  { background: #e89c3a; }
.dot.grey   { background: #7a93a8; }
#status-lbl {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #7a93a8;
  transition: color 0.3s;
}
#status-lbl.green { color: #3dba78; }
#status-lbl.amber { color: #e89c3a; }
#status-lbl.grey  { color: #7a93a8; }

/* Changeover timer — hidden by default, shown inline next to badge in changeover state */
#co-elapsed {
  display: none;
  font-size: 62px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: #e89c3a;
  margin-left: 24px;
  line-height: 1;
}
#co-elapsed.overdue { color: #e84040; }
#active:has(#active-content[data-state="changeover"]) #co-elapsed { display: inline; }
/* Running timer — hidden by default, shown inline next to badge in running/paused state */
#run-elapsed {
  display: none;
  font-size: 62px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: #3dba78;
  margin-left: 24px;
  line-height: 1;
}
#active:has(#active-content[data-state="running"]) #run-elapsed { display: inline; }
/* Bigger status label in changeover and running/paused states */
#active:has(#active-content[data-state="changeover"]) #status-lbl { font-size: 44px; }
#active:has(#active-content[data-state="running"])    #status-lbl { font-size: 44px; }

/* Content area fills the remaining space. State managed by data-state attribute. */
#active-content {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* State switching — pure CSS, no JS display toggling */
#active-content[data-state="running"]    #co-block,
#active-content[data-state="running"]    #idle-block   { display: none; }
#active-content[data-state="changeover"] #run-block,
#active-content[data-state="changeover"] #idle-block   { display: none; }
#active-content[data-state="idle"]       #run-block,
#active-content[data-state="idle"]       #co-block     { display: none; }

/* Progress bar hidden when idle, visible for running + changeover */
#active:has(#active-content[data-state="idle"]) #progress-wrap { display: none; }

/* Running block */
#run-block {
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  gap: 20px;
  flex: 1;
  min-height: 0;
}
#job-name {
  font-size: 64px;
  font-weight: 900;
  line-height: 1.05;
  color: #ffffff;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
#job-meta {
  font-size: 30px;
  color: rgba(255,255,255,0.85);
  margin-top: -10px;
}
.stat-row {
  display: flex;
  align-items: baseline;
  gap: 14px;
}
.stat-lbl {
  font-size: 14px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.80);
  flex-shrink: 0;
  white-space: nowrap;
  min-width: 90px;
}
.timer {
  font-size: 80px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: #ffffff;
  line-height: 1;
}
.rate {
  font-size: 38px;
  font-weight: 700;
  color: #c9a84c;
  font-variant-numeric: tabular-nums;
  line-height: 1;
}
#progress-wrap { flex-shrink: 0; padding-top: 16px; }
#bar-bg {
  height: 30px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.35);
  border-radius: 5px;
  overflow: hidden;
  margin-bottom: 8px;
}
#bar-fill {
  height: 100%;
  width: 0%;
  background: #3dba78;
  border-radius: 5px;
  transition: width 1s linear;
}
#bar-meta {
  display: flex;
  justify-content: space-between;
  font-size: 20px;
  color: rgba(255,255,255,0.85);
}

/* Changeover block */
#co-block {
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  gap: 20px;
  flex: 1;
  min-height: 0;
}
#co-job-name {
  font-size: 64px;
  font-weight: 900;
  line-height: 1.05;
  color: #ffffff;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
#co-job-meta {
  font-size: 30px;
  color: rgba(255,255,255,0.85);
  margin-top: -10px;
}

/* Idle block */
#idle-block {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
}
#idle-msg  { font-size: 52px; color: rgba(255,255,255,0.2); font-weight: 900; }
#idle-next { font-size: 22px; color: #7a93a8; }

/* ── QUEUE PANEL (right, remaining width) ────────────────── */
#queue {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 20px 28px;
  border-left: 1px solid #1a2e45;
  overflow: hidden;
  min-width: 0;
}

/* "Next Up" title — FIRST child, flex-shrink:0. Cannot be pushed off screen. */
#queue-title {
  flex-shrink: 0;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #c9a84c;
  padding-bottom: 14px;
  margin-bottom: 14px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
#jobs-list {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.job-card {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 10px 0;
  border-bottom: 1px solid #1a2e45;
  min-height: 0;
  overflow: hidden;
}
.job-card:last-child { border-bottom: none; }
.job-rank  { font-size: 16px; color: #c9a84c; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 4px; }
.job-cname { font-size: 36px; font-weight: 700; color: #ffffff; line-height: 1.15; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.job-cmeta { font-size: 19px; color: rgba(255,255,255,0.85); margin-top: 4px; }
.no-jobs   { font-size: 22px; color: #7a93a8; padding: 20px 0; }

/* ── BAYS ROW ───────────────────────────────────────────── */
#bays {
  display: flex;
  border-top: 2px solid #1a2e45;
  overflow: hidden;
  min-height: 0;
}
#bays-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  flex: 1;
  min-width: 0;
}
.bay-card {
  display: flex;
  flex-direction: row;
  align-items: stretch;
  border-right: 1px solid #1a2e45;
  background: #090f1a;
  overflow: hidden;
  min-width: 0;
}
.bay-card:last-child  { border-right: none; }
.bay-card.occupied    { background: #0d1e35; border-top: 3px solid #c9a84c; }
.bay-card.running     { background: #071510; border-top: 3px solid #3dba78; }
.bay-card.changeover  { background: #1a1205; border-top: 3px solid #e89c3a; }
.bay-num {
  width: 92px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 84px;
  font-weight: 900;
  color: rgba(255,255,255,0.55);
  border-right: 1px solid #1a2e45;
}
.bay-card.staged     .bay-num { color: rgba(255,255,255,0.90); }
.bay-card.occupied   .bay-num { color: rgba(201,168,76,1.0); }
.bay-card.running    .bay-num { color: #3dba78; }
.bay-card.changeover .bay-num { color: #e89c3a; }
.bay-info {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 8px 14px;
  gap: 6px;
  overflow: hidden;
  min-width: 0;
}
.bay-job {
  font-size: 23px;
  font-weight: 700;
  color: #ffffff;
  line-height: 1.2;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
.bay-empty { font-size: 28px; color: rgba(255,255,255,0.55); font-weight: 700; }
.bay-st {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 2px 8px;
  border-radius: 3px;
  align-self: flex-start;
}
.bay-st.running    { background: rgba(61,186,120,0.15);  color: #3dba78; }
.bay-st.changeover { background: rgba(232,156,58,0.15);  color: #e89c3a; }
.bay-st.staged     { background: rgba(201,168,76,0.1);   color: #c9a84c; }
.bay-st.paused     { background: rgba(122,147,168,0.15); color: #7a93a8; }

/* ── BPH STRIP ──────────────────────────────────────────── */
#bph {
  display: flex;
  flex-direction: column;
  border-top: 2px solid #1a2e45;
  padding: 10px 20px;
  overflow: hidden;
  background: #060f1a;
}
#bph-hdr {
  flex-shrink: 0;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #c9a84c;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 12px;
}
#bph-idle-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  background: transparent;
  transition: background 0.3s;
}
#bph-idle-dot.idle { background: #e89c3a; }
#bph-last { font-size: 12px; color: #7a93a8; font-weight: 400; letter-spacing: 0; text-transform: none; }
#active-bph { margin-left: auto; font-size: 14px; font-weight: 700; color: #c9a84c; letter-spacing: 0; text-transform: none; }
#bph-tiles {
  display: flex;
  flex: 1;
  min-height: 0;
  gap: 12px;
}
.bph-tile {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #0a1828;
  border: 1px solid #1a2e45;
  border-radius: 6px;
  gap: 3px;
}
.bph-tile.live {
  background: #071510;
  border-color: rgba(61,186,120,0.35);
}
.bph-tile-lbl  { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.75); }
.bph-tile.live .bph-tile-lbl { color: #3dba78; }
.bph-tile-val  { font-size: 42px; font-weight: 700; font-variant-numeric: tabular-nums; color: #ffffff; line-height: 1; }
.bph-tile.live .bph-tile-val { color: #c9a84c; }
.bph-tile-unit { font-size: 12px; color: rgba(255,255,255,0.70); text-transform: uppercase; letter-spacing: 0.08em; }

@keyframes bph-flash {
  0%   { opacity: 1; }
  30%  { opacity: 0.25; }
  100% { opacity: 1; }
}
.bph-tile.live .bph-tile-val.flash { animation: bph-flash 0.7s ease; }
</style>
</head>
<body>

<!-- ── HEADER ──────────────────────────────────────────────── -->
<header id="hdr">
  <div id="hdr-logo">Lighthouse Drinks</div>
  <div id="hdr-mid">
    <span id="hdr-date"></span>
    <span id="hdr-shift"></span>
  </div>
  <div id="hdr-right">
    <span id="clock">00:00:00</span>
    <button id="btn-fs">&#x26F6; Fullscreen</button>
  </div>
</header>

<!-- ── MAIN GRID ────────────────────────────────────────────── -->
<main id="main">

  <!-- TOP ROW: active job + next jobs -->
  <div id="top">

    <!-- LEFT: active job panel -->
    <div id="active">

      <!-- Status badge: ALWAYS visible, outside the state-switched content -->
      <div id="status-badge">
        <span class="dot grey" id="status-dot"></span>
        <span id="status-lbl" class="grey">Loading</span>
        <span id="co-elapsed">00:00:00</span>
        <span id="run-elapsed">00:00:00</span>
      </div>

      <!-- State-switched content -->
      <div id="active-content" data-state="idle">

        <!-- RUNNING state -->
        <div id="run-block">
          <div id="job-name">—</div>
          <div id="job-meta">—</div>
        </div>

        <!-- CHANGEOVER state -->
        <div id="co-block">
          <div id="co-job-name">—</div>
          <div id="co-job-meta">—</div>
        </div>

        <!-- IDLE state -->
        <div id="idle-block">
          <div id="idle-msg">No Active Job</div>
          <div id="idle-next"></div>
        </div>

      </div><!-- /active-content -->

      <!-- Progress bar — always visible in active panel (running & changeover) -->
      <div id="progress-wrap">
        <div id="bar-bg"><div id="bar-fill"></div></div>
        <div id="bar-meta">
          <span id="bar-pct">0%</span>
          <span id="btg">—</span>
        </div>
      </div>

    </div><!-- /active -->

    <!-- RIGHT: next jobs queue -->
    <div id="queue">

      <!-- "Next Up" title: ALWAYS visible, outside the jobs list -->
      <div id="queue-title">Next Up</div>

      <!-- Job cards rendered by JS -->
      <div id="jobs-list">
        <div class="no-jobs">Loading…</div>
      </div>

    </div><!-- /queue -->

  </div><!-- /top -->

  <!-- BAYS ROW -->
  <div id="bays">
    <div id="bays-grid"><!-- rendered by JS --></div>
  </div>

  <!-- BPH STRIP -->
  <div id="bph">
    <div id="bph-hdr">
      Bottles / Hour
      <span id="bph-idle-dot"></span>
      <span id="bph-last"></span>
      <span id="active-bph">&mdash;</span>
    </div>
    <div id="bph-tiles"><!-- rendered by JS --></div>
  </div>

</main>

<script>
'use strict';

const SUPA_URL    = 'https://anhawgzgxoywophqbmji.supabase.co';
const SUPA_KEY    = 'sb_publishable_i2EJHAkWd3CBNgM8kieVSA_erAhqBXs';
const KIOSK_EMAIL = 'warehouse@lighthousedrinks.com';
const KIOSK_PASS  = 'Lhouse2018*';

const PROD_WINDOWS = [
  [7*60,       10*60+30],
  [10*60+45,   13*60+30],
  [14*60,      15*60+45],
  [17*60,      21*60]
];

// ── Module state ──────────────────────────────────────────────
let _sb           = null;
let _jobs         = [];
let _activeJob    = null;
let _runningCount = 0;
let _lastEventAt  = null;
let _liveBph      = 0;
let _hourlyBars   = [];
let _bankHols     = {};
let _workOvr      = {};
let _tick1s       = null;
let _tick30s      = null;
let _rtLine       = null;
let _rtJobs       = null;
let _rtDebounce   = null;
let _lastHour     = -1;

// ── Tiny helpers ──────────────────────────────────────────────
function p2(n) { return (n < 10 ? '0' : '') + n; }
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function fmtSecs(s) {
  s = Math.max(0, Math.floor(s));
  return p2(Math.floor(s/3600)) + ':' + p2(Math.floor((s%3600)/60)) + ':' + p2(s%60);
}
function fmtDate(dt) {
  const D = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const M = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return D[dt.getDay()] + ' ' + dt.getDate() + ' ' + M[dt.getMonth()] + ' ' + dt.getFullYear();
}
function fmtAgo(dt) {
  if (!dt) return '';
  const s = Math.floor((Date.now() - dt.getTime()) / 1000);
  if (s < 5)  return 'just now';
  if (s < 60) return s + ' secs ago';
  const m = Math.floor(s / 60);
  if (m < 60) return m + ' min' + (m === 1 ? '' : 's') + ' ago';
  return Math.floor(m / 60) + 'h ago';
}
function dstr(dt) { return dt.toISOString().slice(0, 10); }

// ── Irish bank holidays ───────────────────────────────────────
(function () {
  function easter(y) {
    var a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,
        f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,
        i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,
        m=Math.floor((a+11*h+22*l)/451);
    return new Date(y, Math.floor((h+l-7*m+114)/31)-1, ((h+l-7*m+114)%31)+1);
  }
  function nextMon(dt) {
    var d=new Date(dt); d.setHours(0,0,0,0);
    var w=d.getDay(); if(w!==1) d.setDate(d.getDate()+(w===0?1:8-w)); return d;
  }
  function fstMon(y,m) { return nextMon(new Date(y,m-1,1)); }
  function lstMon(y,m) {
    var l=new Date(y,m,0); var w=l.getDay();
    l.setDate(l.getDate()-(w===0?6:w-1)); return l;
  }
  function fxd(y,mo,day) {
    var d=new Date(y,mo-1,day),w=d.getDay();
    if(w===6) d.setDate(d.getDate()+2);
    if(w===0) d.setDate(d.getDate()+1);
    return d;
  }
  function hols(y) {
    var h={};
    h[dstr(fxd(y,1,1))]=1;
    var f=new Date(y,1,1); h[dstr(f.getDay()===5?f:fstMon(y,2))]=1;
    h[dstr(fxd(y,3,17))]=1;
    var e=easter(y); e.setDate(e.getDate()+1); h[dstr(e)]=1;
    h[dstr(fstMon(y,5))]=1; h[dstr(fstMon(y,6))]=1;
    h[dstr(fstMon(y,8))]=1; h[dstr(lstMon(y,10))]=1;
    h[dstr(fxd(y,12,25))]=1; h[dstr(fxd(y,12,26))]=1;
    return h;
  }
  const yr = new Date().getFullYear();
  [hols(yr), hols(yr+1)].forEach(h => Object.keys(h).forEach(k => { _bankHols[k] = true; }));
})();

function isNonWorking(dt) {
  const d = dstr(dt);
  if (_workOvr[d]) return false;
  const w = dt.getDay();
  return w === 0 || w === 6 || !!_bankHols[d];
}

function prodMins(s, e) {
  let t = 0;
  for (let i = 0; i < PROD_WINDOWS.length; i++) {
    const ws = Math.max(s, PROD_WINDOWS[i][0]);
    const we = Math.min(e, PROD_WINDOWS[i][1]);
    if (we > ws) t += we - ws;
  }
  return t;
}

function calcProdSecs(a, b) {
  if (!a || !b || b <= a) return 0;
  let total = 0;
  const lim = new Date(Math.min(b.getTime(), a.getTime() + 90 * 86400000));
  let cur = new Date(a);
  for (let g = 0; g < 200 && cur < lim; g++) {
    const dayStart = new Date(cur); dayStart.setHours(0,0,0,0);
    if (isNonWorking(dayStart)) { cur = new Date(dayStart); cur.setDate(dayStart.getDate()+1); continue; }
    for (let wi = 0; wi < PROD_WINDOWS.length; wi++) {
      const wsA = new Date(dayStart.getTime() + PROD_WINDOWS[wi][0] * 60000);
      const weA = new Date(dayStart.getTime() + PROD_WINDOWS[wi][1] * 60000);
      const oS  = new Date(Math.max(cur.getTime(), wsA.getTime()));
      const oE  = new Date(Math.min(lim.getTime(), weA.getTime()));
      if (oE > oS) total += (oE - oS) / 1000;
    }
    cur = new Date(dayStart); cur.setDate(dayStart.getDate()+1);
  }
  return total;
}

// ── BPH helpers ───────────────────────────────────────────────
function barBph(totalBottles, localHour) {
  if (!totalBottles || totalBottles <= 0) return 0;
  const now = new Date();
  const nowMin = now.getHours()*60 + now.getMinutes();
  let effStart = localHour * 60;
  if (_activeJob && _activeJob.actual_start) {
    const as = new Date(_activeJob.actual_start);
    if (as.getHours() === localHour)
      effStart = Math.max(effStart, as.getHours()*60 + as.getMinutes());
  }
  const effEnd = (localHour === now.getHours()) ? nowMin : (localHour + 1) * 60;
  const pm = prodMins(effStart, effEnd);
  return pm > 0 ? Math.round(totalBottles / pm * 60) : 0;
}

function currentHourTotal() {
  const h = new Date().getHours();
  for (let i = 0; i < _hourlyBars.length; i++) {
    if (new Date(_hourlyBars[i].hourUtc).getHours() === h) return _hourlyBars[i].totalBottles;
  }
  return 0;
}

function todayStart() {
  const n = new Date();
  return new Date(n.getFullYear(), n.getMonth(), n.getDate(), 7, 0, 0, 0).toISOString();
}

// ── DB fetch helper ───────────────────────────────────────────
async function dbGet(path) {
  try {
    let token = SUPA_KEY;
    try {
      const s = await _sb.auth.getSession();
      if (s && s.data && s.data.session) token = s.data.session.access_token;
    } catch(e2) {}
    const r = await fetch(SUPA_URL + '/rest/v1/' + path, {
      headers: {
        'apikey':        SUPA_KEY,
        'Authorization': 'Bearer ' + token,
        'Accept':        'application/json'
      }
    });
    if (!r.ok) {
      console.warn('[PD] dbGet HTTP', r.status, path, await r.text());
      return [];
    }
    return await r.json();
  } catch(e) { console.warn('[PD] dbGet:', e); return []; }
}

// ── Render: status + active job left panel ────────────────────
function renderLeft() {
  const content = document.getElementById('active-content');
  const dot     = document.getElementById('status-dot');
  const lbl     = document.getElementById('status-lbl');
  if (!content) return;

  const j = _activeJob;

  if (!j) {
    content.dataset.state = 'idle';
    dot.className = 'dot grey';
    lbl.className = 'grey';
    lbl.textContent = 'Idle';
    const q = nextQueued();
    document.getElementById('idle-next').textContent =
      q.length ? 'Next: ' + (q[0].product_name || q[0].id) : 'No jobs queued';
    return;
  }

  if (!j.actual_start && j.changeover_start) {
    content.dataset.state = 'changeover';
    dot.className = 'dot amber';
    lbl.className = 'amber';
    lbl.textContent = 'Changeover';
    document.getElementById('co-job-name').textContent = j.product_name || j.id;
    document.getElementById('co-job-meta').textContent =
      j.bottle_target ? j.bottle_target.toLocaleString() + ' btls' : '';
    return;
  }

  const isPaused = !!(j.actual_start && j.paused_at && !j.actual_end);
  content.dataset.state = 'running';
  dot.className = 'dot ' + (isPaused ? 'grey' : 'green');
  lbl.className = isPaused ? 'grey' : 'green';
  lbl.textContent = isPaused ? 'Paused' : 'Running';
  document.getElementById('job-name').textContent = j.product_name || j.id;
  document.getElementById('job-meta').textContent =
    j.bottle_target ? j.bottle_target.toLocaleString() + ' btls' : '';
}

// ── Render: next jobs queue ───────────────────────────────────
function nextQueued() {
  return _jobs
    .filter(j => !j.actual_start && !j.changeover_start && j.stage !== 'complete')
    .sort((a, b) => {
      const ap = a.bay_waitlist_priority != null ? a.bay_waitlist_priority : 99999;
      const bp = b.bay_waitlist_priority != null ? b.bay_waitlist_priority : 99999;
      return ap !== bp ? ap - bp : (a.created_at < b.created_at ? -1 : 1);
    });
}

function renderNextJobs() {
  const el = document.getElementById('jobs-list');
  if (!el) return;
  const q = nextQueued().slice(0, 2);
  if (!q.length) {
    el.innerHTML = '<div class="no-jobs">No jobs queued</div>';
    return;
  }
  el.innerHTML = q.map((j, i) => {
    const btls   = j.bottle_target ? j.bottle_target.toLocaleString() + ' btls' : '';
    const client = j.clients && j.clients.name ? esc(j.clients.name) : '';
    const meta   = [btls, client].filter(Boolean).join(' · ');
    return `<div class="job-card">
      <div class="job-rank">#${i + 1}</div>
      <div class="job-cname">${esc(j.product_name || j.id)}</div>
      ${meta ? `<div class="job-cmeta">${esc(meta)}</div>` : ''}
    </div>`;
  }).join('');
}

// ── Render: bay cards ─────────────────────────────────────────
function renderBays() {
  const grid = document.getElementById('bays-grid');
  if (!grid) return;
  let html = '';
  for (let bay = 1; bay <= 5; bay++) {
    const job = _jobs.find(j => String(j.job_bay) === String(bay) && !j.bay_released_at);
    if (!job) {
      html += `<div class="bay-card">
        <div class="bay-num">${bay}</div>
        <div class="bay-info"><div class="bay-empty">—</div></div>
      </div>`;
      continue;
    }
    const isRun  = !!(job.actual_start && !job.actual_end && !job.paused_at);
    const isCo   = !job.actual_start && !!job.changeover_start;
    const isPau  = !!(job.actual_start && job.paused_at && !job.actual_end);
    const hasAny = !!(job.actual_start || job.changeover_start);
    const cls    = 'bay-card' + (isRun ? ' running' : isCo ? ' changeover' : hasAny ? ' occupied' : ' staged');
    const sc     = isRun ? 'running' : isCo ? 'changeover' : isPau ? 'paused' : 'staged';
    const st     = isRun ? 'Running'  : isCo ? 'Changeover' : isPau ? 'Paused'  : 'Staged';
    html += `<div class="${cls}">
      <div class="bay-num">${bay}</div>
      <div class="bay-info">
        <div class="bay-job">${esc(job.product_name || job.id)}</div>
        <div class="bay-st ${sc}">${st}</div>
      </div>
    </div>`;
  }
  grid.innerHTML = html;
}

// ── Render: BPH tiles ─────────────────────────────────────────
function renderBph() {
  const el = document.getElementById('bph-tiles');
  if (!el) return;
  const nowH = new Date().getHours();
  const byH  = {};
  _hourlyBars.forEach(b => { byH[new Date(b.hourUtc).getHours()] = b; });
  const PROD_H = [7,8,9,10,11,12,13,14,15,17,18,19,20];
  const prev4  = PROD_H.filter(h => h < nowH).slice(-4);

  function tile(h, isLive) {
    const lbl  = isLive ? 'LIVE' : (p2(h) + '&ndash;' + p2(h + 1));
    const tot  = isLive ? currentHourTotal() : ((byH[h] || {}).totalBottles || 0);
    const bph  = barBph(tot, h);
    const val  = bph > 0 ? bph.toLocaleString() : '&mdash;';
    const idA  = isLive ? ` id="bph-val-${h}"` : '';
    return `<div class="bph-tile${isLive ? ' live' : ''}">
      <div class="bph-tile-lbl">${lbl}</div>
      <div class="bph-tile-val"${idA}>${val}</div>
      <div class="bph-tile-unit">bph</div>
    </div>`;
  }
  el.innerHTML = prev4.map(h => tile(h, false)).join('') + tile(nowH, true);
}

function updateLiveTile() {
  const h = new Date().getHours();
  const v = document.getElementById('bph-val-' + h);
  if (!v) return;
  const bph = barBph(currentHourTotal(), h);
  v.innerHTML = bph > 0 ? bph.toLocaleString() : '&mdash;';
}

// ── 1-second tick ─────────────────────────────────────────────
function tick() {
  const now = new Date();

  // Clock
  const ck = document.getElementById('clock');
  if (ck) ck.textContent = p2(now.getHours()) + ':' + p2(now.getMinutes()) + ':' + p2(now.getSeconds());

  // Header date + shift
  const hd = document.getElementById('hdr-date');
  if (hd) hd.textContent = fmtDate(now);
  const hs = document.getElementById('hdr-shift');
  if (hs) {
    const m = now.getHours()*60 + now.getMinutes();
    let inP = false;
    for (let i = 0; i < PROD_WINDOWS.length; i++) {
      if (m >= PROD_WINDOWS[i][0] && m < PROD_WINDOWS[i][1]) { inP = true; break; }
    }
    hs.textContent = inP ? 'In Production' : 'Out of Hours';
  }

  // Hour rollover — refresh historical tiles
  const curH = now.getHours();
  if (_lastHour >= 0 && curH !== _lastHour) reloadHourly();
  _lastHour = curH;

  // Active job timers
  if (_activeJob) {
    if (_activeJob.actual_start && !_activeJob.actual_end) {
      const endDt  = _activeJob.paused_at ? new Date(_activeJob.paused_at) : now;
      const elapsed = Math.max(0,
        calcProdSecs(new Date(_activeJob.actual_start), endDt) - (_activeJob.total_paused_secs || 0)
      );
      const et = document.getElementById('run-elapsed');
      if (et) et.textContent = fmtSecs(elapsed);
    } else if (_activeJob.changeover_start && !_activeJob.actual_start) {
      const coS = Math.max(0, calcProdSecs(new Date(_activeJob.changeover_start), now));
      const ce  = document.getElementById('co-elapsed');
      if (ce) {
        ce.textContent = fmtSecs(coS);
        ce.classList.toggle('overdue', coS >= 10800);
      }
    }

    // Progress bar — fills only while a job is actually running; blank during changeover
    if (_activeJob.actual_start && !_activeJob.actual_end && _activeJob.bottle_target) {
      const pct  = Math.min(_runningCount / _activeJob.bottle_target, 1) * 100;
      const toGo = Math.max(_activeJob.bottle_target - _runningCount, 0);
      const bf   = document.getElementById('bar-fill');
      const bp   = document.getElementById('bar-pct');
      const btg  = document.getElementById('btg');
      if (bf)  bf.style.width  = pct.toFixed(1) + '%';
      if (bp)  bp.textContent  = Math.floor(pct) + '%';
      if (btg) btg.textContent = toGo.toLocaleString() + ' bottles to go';
    } else if (_activeJob.changeover_start && !_activeJob.actual_start) {
      const bf  = document.getElementById('bar-fill');
      const bp  = document.getElementById('bar-pct');
      const btg = document.getElementById('btg');
      if (bf)  bf.style.width  = '0%';
      if (bp)  bp.textContent  = '';
      if (btg) btg.textContent = '';
    }
  }

  // BPH idle dot + last seen
  const idot = document.getElementById('bph-idle-dot');
  const ls   = document.getElementById('bph-last');
  if (idot) idot.className = (!_lastEventAt || (Date.now() - _lastEventAt.getTime() > 2*60*1000)) ? 'idle' : '';
  if (ls)   ls.textContent = fmtAgo(_lastEventAt);

  updateLiveTile();
}

// ── Data loaders ──────────────────────────────────────────────
async function loadWorkOvr() {
  try {
    const rows = await dbGet('app_settings?key=eq.working_day_overrides&limit=1&select=value');
    _workOvr = {};
    if (rows && rows.length && rows[0].value) {
      const arr = typeof rows[0].value === 'string' ? JSON.parse(rows[0].value) : rows[0].value;
      (arr || []).forEach(d => { _workOvr[d] = true; });
    }
  } catch(e) { _workOvr = {}; }
}

async function reloadJobs() {
  try {
    const jobs = await dbGet(
      'jobs?stage=in.(new,active)' +
      '&select=id,product_name,bottle_target,job_bay,bay_released_at,actual_start,actual_end,' +
      'paused_at,total_paused_secs,changeover_start,scheduled_start,stage,' +
      'bay_waitlist_priority,created_at,clients(name)' +
      '&order=bay_waitlist_priority.asc.nullslast,created_at.asc'
    );
    _jobs = jobs || [];
    const active = _jobs.filter(j => !j.actual_end && (j.actual_start || j.changeover_start));
    active.sort((a, b) =>
      new Date(b.actual_start || b.changeover_start) - new Date(a.actual_start || a.changeover_start)
    );
    _activeJob = active.length ? active[0] : null;
    renderLeft(); renderNextJobs(); renderBays();
  } catch(e) { console.warn('[PD] reloadJobs error:', e); }
}

async function reloadHourly() {
  try {
    const rows = await dbGet(
      'line_hourly_totals?line_id=eq.1&hour_utc=gte.' + todayStart() +
      '&select=hour_utc,total_bottles,last_event_at&order=hour_utc.asc'
    );
    _hourlyBars = (rows || []).map(r => ({
      hourUtc: r.hour_utc, totalBottles: r.total_bottles || 0, lastEventAt: r.last_event_at
    }));
    renderBph();
  } catch(e) { console.warn('[PD] reloadHourly error:', e); }
}

async function pollLive() {
  try {
    const rows = await dbGet('line_throughput_live?line_id=eq.1&select=bottles_per_hour,last_event_at');
    if (rows && rows.length) {
      _liveBph = rows[0].bottles_per_hour || 0;
      if (rows[0].last_event_at) _lastEventAt = new Date(rows[0].last_event_at);
    } else {
      _liveBph = 0;
    }
    const bphEl = document.getElementById('active-bph');
    if (bphEl) bphEl.textContent = _liveBph > 0 ? _liveBph.toLocaleString() + ' bph' : '—';
    updateLiveTile();
  } catch(e) { console.warn('[PD] pollLive error:', e); }
}

// ── Fullscreen toggle ─────────────────────────────────────────
document.getElementById('btn-fs').addEventListener('click', function () {
  if (!document.fullscreenElement)
    document.documentElement.requestFullscreen().catch(() => {});
  else
    document.exitFullscreen();
});

// ── Boot ──────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async function () {

  _sb = window.supabase.createClient(SUPA_URL, SUPA_KEY, {
    auth: {
      storageKey:      'pd-auth',   // isolated kiosk session, unaffected by operator logins
      persistSession:  true,
      autoRefreshToken: true
    }
  });

  // Kiosk auth
  _sb.auth.onAuthStateChange(event => {
    if (event === 'SIGNED_OUT') {
      _sb.auth.signInWithPassword({ email: KIOSK_EMAIL, password: KIOSK_PASS })
        .catch(e => console.warn('[PD] re-auth:', e));
    }
  });

  const sess = await _sb.auth.getSession();
  if (!sess.data?.session) {
    const { error: authErr } = await _sb.auth.signInWithPassword(
      { email: KIOSK_EMAIL, password: KIOSK_PASS }
    );
    if (authErr) console.warn('[PD] sign-in failed:', authErr.message);
  }

  // Auto-fullscreen (silently ignored if browser blocks it)
  document.documentElement.requestFullscreen().catch(() => {});

  await loadWorkOvr();

  // Load jobs
  const jobs = await dbGet(
    'jobs?stage=in.(new,active)' +
    '&select=id,product_name,bottle_target,job_bay,actual_start,actual_end,' +
    'paused_at,total_paused_secs,changeover_start,scheduled_start,stage,' +
    'bay_waitlist_priority,created_at,clients(name)' +
    '&order=bay_waitlist_priority.asc.nullslast,created_at.asc'
  );
  _jobs = jobs || [];
  const active = _jobs.filter(j => !j.actual_end && (j.actual_start || j.changeover_start));
  active.sort((a, b) =>
    new Date(b.actual_start || b.changeover_start) - new Date(a.actual_start || a.changeover_start)
  );
  _activeJob = active.length ? active[0] : null;

  // Hourly bars
  const hRows = await dbGet(
    'line_hourly_totals?line_id=eq.1&hour_utc=gte.' + todayStart() +
    '&select=hour_utc,total_bottles,last_event_at&order=hour_utc.asc'
  );
  _hourlyBars = (hRows || []).map(r => ({
    hourUtc: r.hour_utc, totalBottles: r.total_bottles || 0, lastEventAt: r.last_event_at
  }));

  // Seed running count from hourly bars since job started
  _runningCount = 0;
  if (_activeJob && _activeJob.actual_start) {
    const jobStart = new Date(_activeJob.actual_start).getTime();
    _hourlyBars.forEach(b => {
      if (new Date(b.hourUtc).getTime() + 3600000 > jobStart) _runningCount += b.totalBottles;
    });
  }

  // Live BPH
  const lRows = await dbGet('line_throughput_live?line_id=eq.1&select=bottles_per_hour,last_event_at');
  if (lRows && lRows.length) {
    _liveBph = lRows[0].bottles_per_hour || 0;
    if (lRows[0].last_event_at) _lastEventAt = new Date(lRows[0].last_event_at);
  }
  // Also check latest hourly bar for a more recent timestamp
  if (_hourlyBars.length) {
    const lat = _hourlyBars[_hourlyBars.length - 1];
    if (lat.lastEventAt) {
      const t = new Date(lat.lastEventAt);
      if (!_lastEventAt || t > _lastEventAt) _lastEventAt = t;
    }
  }

  // Initial render
  renderLeft(); renderNextJobs(); renderBays(); renderBph();
  const bphEl = document.getElementById('active-bph');
  if (bphEl) bphEl.textContent = _liveBph > 0 ? _liveBph.toLocaleString() + ' bph' : '—';

  // Start ticks
  _lastHour = new Date().getHours();
  _tick1s   = setInterval(tick, 1000);
  tick();
  _tick30s  = setInterval(pollLive, 30000);
  // Polling fallback — catches job state changes even if realtime drops
  setInterval(reloadJobs, 10000);

  // Realtime — bottle counter (line 1)
  _rtLine = _sb.channel('pd_line_events_1')
    .on('postgres_changes',
      { event: 'INSERT', schema: 'public', table: 'line_events', filter: 'line_id=eq.1' },
      payload => {
        const cnt = (payload.new && payload.new.count) ? Number(payload.new.count) : 1;
        _runningCount += cnt;
        _lastEventAt   = new Date();

        // Update hourly bar in memory
        const h = new Date().getHours();
        let idx = -1;
        for (let ii = 0; ii < _hourlyBars.length; ii++) {
          if (new Date(_hourlyBars[ii].hourUtc).getHours() === h) { idx = ii; break; }
        }
        if (idx >= 0) {
          _hourlyBars[idx].totalBottles += cnt;
          _hourlyBars[idx].lastEventAt   = new Date().toISOString();
        } else {
          const hs = new Date(); hs.setMinutes(0,0,0);
          _hourlyBars.push({ hourUtc: hs.toISOString(), totalBottles: cnt, lastEventAt: new Date().toISOString() });
        }

        updateLiveTile();

        // Flash the live tile
        const v = document.getElementById('bph-val-' + h);
        if (v) {
          v.classList.remove('flash');
          void v.offsetWidth;
          v.classList.add('flash');
          setTimeout(() => v && v.classList.remove('flash'), 800);
        }
      }
    )
    .subscribe();

  // Realtime — jobs table (any change re-renders panels)
  _rtJobs = _sb.channel('pd_jobs')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'jobs' }, () => {
      clearTimeout(_rtDebounce);
      _rtDebounce = setTimeout(reloadJobs, 300);
    })
    .subscribe();
});
