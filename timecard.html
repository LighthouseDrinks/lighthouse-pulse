<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>My Hours — Lighthouse Drinks</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0d1b2a; --navy-card:#16263a; --navy-border:#243d57;
    --gold:#c9a84c; --muted:#7a93a8; --text:#cdd8e3; --white:#fff;
    --green:#3dba78; --red:#e05757;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--navy);color:var(--text);font-family:Lato,sans-serif;line-height:1.5;}
  .wrap{max-width:560px;margin:0 auto;padding:24px 16px 60px;}
  .brand{text-align:center;padding:24px 0 18px;}
  .brand h1{color:var(--gold);font-size:22px;margin:0;letter-spacing:0.02em;}
  .brand p{color:var(--muted);font-size:12px;margin:4px 0 0;}
  h2{font-size:19px;color:var(--white);margin:8px 0 4px;}
  .sub{color:var(--muted);font-size:13px;margin:0 0 20px;}
  .day{background:var(--navy-card);border:1px solid var(--navy-border);border-radius:8px;padding:16px;margin-bottom:16px;}
  .day-head{font-weight:700;font-size:15px;color:var(--white);margin-bottom:6px;}
  .issues{font-size:12px;color:var(--gold);margin-bottom:14px;}
  .hint{font-size:11px;color:var(--muted);margin-bottom:12px;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.04em;}
  input[type=time]{width:100%;background:var(--navy);border:1px solid var(--navy-border);color:var(--white);padding:11px 12px;font-size:16px;border-radius:6px;font-family:Lato,sans-serif;}
  textarea.reason{width:100%;background:var(--navy);border:1px solid var(--navy-border);color:var(--white);padding:11px 12px;font-size:15px;border-radius:6px;font-family:Lato,sans-serif;resize:vertical;min-height:60px;}
  textarea.reason::placeholder{color:var(--muted);opacity:0.7;}
  .field label .opt{text-transform:none;letter-spacing:0;color:var(--muted);font-weight:400;}
  .two{display:flex;gap:10px;}
  .two .field{flex:1;}
  .breaks-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.04em;margin:6px 0 6px;}
  .break-row{display:flex;gap:10px;align-items:flex-end;margin-bottom:8px;}
  .break-row .field{flex:1;margin-bottom:0;}
  .rm{background:transparent;border:1px solid var(--navy-border);color:var(--muted);border-radius:6px;padding:10px 12px;cursor:pointer;font-size:13px;}
  .addbreak{background:transparent;border:1px dashed var(--navy-border);color:var(--gold);border-radius:6px;padding:8px 12px;cursor:pointer;font-size:12px;font-family:Lato,sans-serif;}
  .day-total{margin-top:14px;padding-top:12px;border-top:1px solid var(--navy-border);font-size:13px;color:var(--muted);}
  .day-total .dt-val{color:var(--white);font-weight:700;}
  .weektotal{display:flex;justify-content:space-between;align-items:center;background:var(--navy-card);border:1px solid var(--gold);border-radius:8px;padding:14px 16px;margin:0 0 16px;font-size:14px;color:var(--text);text-transform:uppercase;letter-spacing:0.04em;}
  .weektotal b{color:var(--gold);font-size:19px;letter-spacing:0;}
  .submit{width:100%;background:var(--gold);color:var(--navy);border:none;padding:16px;font-size:16px;font-weight:700;border-radius:8px;cursor:pointer;font-family:Lato,sans-serif;margin-top:8px;}
  .submit:disabled{opacity:0.6;cursor:default;}
  .note{font-size:12px;color:var(--muted);text-align:center;margin-top:16px;line-height:1.5;}
  .state{text-align:center;padding:48px 16px;}
  .state .icon{font-size:40px;margin-bottom:12px;}
  .ok{color:var(--green);}
  .bad{color:var(--red);}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><h1>Lighthouse Drinks</h1><p>Timesheet check</p></div>
  <div id="root"><div class="state"><div class="icon">&#9201;</div><div>Loading…</div></div></div>
</div>

<script>
(function(){
  'use strict';
  var FN='https://anhawgzgxoywophqbmji.supabase.co/functions/v1/timecard';
  var KEY='sb_publishable_i2EJHAkWd3CBNgM8kieVSA_erAhqBXs';
  var root=document.getElementById('root');
  var token=new URLSearchParams(location.search).get('token')||'';
  var DATA=null;

  function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }

  // Net worked = (clock out − clock in) − sum(breaks). Returns null for an
  // incomplete day so it shows "—" and is left out of the week total.
  function hmToMin(s){ if(!/^\d{1,2}:\d{2}$/.test(s||'')) return null; var a=s.split(':'); return (+a[0])*60+(+a[1]); }
  function netMin(ci,co,breaks){
    var s=hmToMin(ci), e=hmToMin(co);
    if(s==null||e==null) return null;
    if(e<s) e+=1440;
    var brk=0;
    (breaks||[]).forEach(function(b){ var bs=hmToMin(b.start), be=hmToMin(b.end);
      if(bs==null||be==null) return; if(be<bs) be+=1440; brk+=Math.max(0,be-bs); });
    return Math.max(0,(e-s)-brk);
  }
  function fmMin(m){ if(m==null) return '—'; var h=Math.floor(m/60); return (h?h+'h ':'')+(m%60)+'m'; }

  function state(icon,cls,msg){
    root.innerHTML='<div class="state"><div class="icon '+cls+'">'+icon+'</div><div>'+esc(msg)+'</div></div>';
  }

  async function call(action,extra){
    var res=await fetch(FN,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+KEY,'apikey':KEY},
      body:JSON.stringify(Object.assign({action:action,token:token},extra||{}))
    });
    var data=await res.json();
    if(!res.ok) throw new Error(data.error||'Something went wrong');
    return data;
  }

  function breakRowHtml(b){
    b=b||{start:'',end:''};
    return '<div class="break-row">'
      +'<div class="field"><label>Break start</label><input type="time" class="b-start" value="'+esc(b.start||'')+'"></div>'
      +'<div class="field"><label>Break end</label><input type="time" class="b-end" value="'+esc(b.end||'')+'"></div>'
      +'<button type="button" class="rm" onclick="this.parentNode.remove()">&times;</button>'
    +'</div>';
  }

  function render(){
    if(!DATA.days.length){
      state('&#10003;','ok','Thanks '+esc(DATA.employeeName)+' — your hours for '+esc(DATA.weekLabel)+' look complete. Nothing to fix!');
      return;
    }
    var h='<h2>Hi '+esc(DATA.employeeName)+',</h2>'
      +'<p class="sub">We need to confirm your hours for <strong>'+esc(DATA.weekLabel)+'</strong>. Pop in your actual times below and submit — your manager will review them.</p>';
    if(DATA.alreadySubmitted) h+='<p class="sub" style="color:var(--gold);">You already submitted these — you can update and resend if needed.</p>';
    DATA.days.forEach(function(d,idx){
      var hint=(d.rosterStart||d.rosterEnd)?'<div class="hint">Your rostered shift: '+esc(d.rosterStart||'?')+' – '+esc(d.rosterEnd||'?')+'</div>':'';
      var breaksHtml=(d.breaks&&d.breaks.length?d.breaks:[]).map(breakRowHtml).join('');
      h+='<div class="day" data-date="'+esc(d.date)+'">'
        +'<div class="day-head">'+esc(d.label)+'</div>'
        +'<div class="issues">'+esc((d.issues||[]).join(' · '))+'</div>'
        +hint
        +'<div class="two">'
          +'<div class="field"><label>Clock in</label><input type="time" class="ci" value="'+esc(d.clockIn||'')+'"></div>'
          +'<div class="field"><label>Clock out</label><input type="time" class="co" value="'+esc(d.clockOut||'')+'"></div>'
        +'</div>'
        +'<div class="breaks-label">Breaks</div>'
        +'<div class="breaks">'+breaksHtml+'</div>'
        +'<button type="button" class="addbreak" data-idx="'+idx+'">+ Add a break</button>'
        +'<div class="field" style="margin-top:14px;margin-bottom:0;"><label>Reason <span class="opt">(so your manager knows what happened)</span></label>'
          +'<textarea class="reason" rows="2" placeholder="e.g. Forgot to clock out, phone died, started early to cover a delivery…">'+esc(d.reason||'')+'</textarea></div>'
        +'<div class="day-total">Worked (after breaks): <span class="dt-val">—</span></div>'
      +'</div>';
    });
    h+='<div class="weektotal">Week total <b id="weekTotal">—</b></div>'
      +'<button type="button" class="submit" id="submitBtn">Submit my hours</button>'
      +'<p class="note">Remember to clock in and out (and for your breaks) each day so you don\u2019t get these emails. Your manager confirms everything before it counts.</p>';
    root.innerHTML=h;

    Array.prototype.forEach.call(document.querySelectorAll('.addbreak'),function(btn){
      btn.addEventListener('click',function(){
        var breaks=btn.previousElementSibling; // .breaks
        var tmp=document.createElement('div'); tmp.innerHTML=breakRowHtml();
        breaks.appendChild(tmp.firstChild);
        recalc();
      });
    });
    document.getElementById('submitBtn').addEventListener('click',submit);
    // Live totals: recompute on any time change, and after add/remove break.
    root.addEventListener('input',recalc);
    root.addEventListener('click',function(ev){ if(ev.target&&ev.target.classList.contains('rm')) setTimeout(recalc,0); });
    recalc();
  }

  // Recompute each day's worked total and the week total from the live inputs.
  function recalc(){
    var weekEl=document.getElementById('weekTotal');
    var total=0, any=false;
    Array.prototype.forEach.call(document.querySelectorAll('.day'),function(el){
      var breaks=[];
      Array.prototype.forEach.call(el.querySelectorAll('.break-row'),function(br){
        breaks.push({start:br.querySelector('.b-start').value, end:br.querySelector('.b-end').value});
      });
      var m=netMin(el.querySelector('.ci').value, el.querySelector('.co').value, breaks);
      var valEl=el.querySelector('.dt-val');
      if(valEl) valEl.textContent=fmMin(m);
      if(m!=null){ total+=m; any=true; }
    });
    if(weekEl) weekEl.textContent=any?fmMin(total):'—';
  }

  async function submit(){
    var btn=document.getElementById('submitBtn');
    btn.disabled=true; btn.textContent='Submitting…';
    var days=[];
    Array.prototype.forEach.call(document.querySelectorAll('.day'),function(el){
      var breaks=[];
      Array.prototype.forEach.call(el.querySelectorAll('.break-row'),function(br){
        var s=br.querySelector('.b-start').value, e=br.querySelector('.b-end').value;
        if(s||e) breaks.push({start:s,end:e});
      });
      var reasonEl=el.querySelector('.reason');
      days.push({
        date:el.getAttribute('data-date'),
        clockIn:el.querySelector('.ci').value,
        clockOut:el.querySelector('.co').value,
        breaks:breaks,
        reason:reasonEl?reasonEl.value:''
      });
    });
    try{
      await call('submit',{days:days});
      state('&#10003;','ok','Thanks '+esc(DATA.employeeName)+'! Your hours have been sent to your manager to confirm. You can close this page.');
    }catch(e){
      btn.disabled=false; btn.textContent='Submit my hours';
      alert(e.message||'Could not submit. Please try again.');
    }
  }

  if(!token){ state('&#9888;','bad','This link is missing its code. Please use the link from your email.'); return; }
  call('get').then(function(data){ DATA=data; render(); }).catch(function(e){
    state('&#9888;','bad',e.message||'This link is no longer valid.');
  });
})();
</script>
</body>
</html>
